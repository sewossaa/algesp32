<!DOCTYPE html>
<html>
<head>
    <title>Captura a ESP32</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        video { max-width: 300px; }
        button { padding: 10px; margin: 5px; }
    </style>
</head>
<body>
    <h2>Captura de Imagen para ESP32</h2>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>
    
    <br>
    <input type="text" id="espIP" placeholder="IP del ESP32" value="192.168.1.100">
    <button onclick="conectar()">Conectar</button>
    <button onclick="capturarEnviar()">Capturar y Enviar</button>
    <button onclick="redimensionar()">Redimensionar a 160x120</button>
    
    <p id="estado"></p>

    <script>
        let ws = null;
        let video = document.getElementById('video');
        let canvas = document.getElementById('canvas');
        let ctx = canvas.getContext('2d');

        // Acceder a cámara
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => video.srcObject = stream);

        function conectar() {
            const ip = document.getElementById('espIP').value;
            ws = new WebSocket(`ws://${ip}:81`);
            ws.binaryType = "arraybuffer";
            
            ws.onopen = () => document.getElementById('estado').textContent = "✓ Conectado";
            ws.onerror = () => document.getElementById('estado').textContent = "✗ Error";
        }

        function capturarEnviar() {
            if(!ws) return alert("Conecta primero");
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            
            canvas.toBlob(blob => {
                let reader = new FileReader();
                reader.onload = (e) => {
                    let arr = new Uint8Array(e.target.result);
                    ws.send(arr);
                    document.getElementById('estado').textContent = "✓ Enviado";
                };
                reader.readAsArrayBuffer(blob);
            }, 'image/jpeg', 0.8);
        }

        function redimensionar() {
    canvas.width = 160;
    canvas.height = 120;
    ctx.drawImage(video, 0, 0, 160, 120);
    
    let imageData = ctx.getImageData(0, 0, 160, 120);
    let data = imageData.data;
    
    // 1. Extraemos los píxeles y calculamos la escala de grises
    let pixeles = new Uint8Array(160 * 120);
    for(let i = 0; i < 160*120; i++) {
        let gray = (data[i*4] + data[i*4 + 1] + data[i*4 + 2]) / 3;
        pixeles[i] = gray;
    }
    
    // 2. Mandamos el encabezado de 4 bytes para avisar al ESP32
    let header = new Uint8Array(4);
    header[0] = 160 >> 8; header[1] = 160;
    header[2] = 120 >> 8; header[3] = 120;
    ws.send(header);
    
    // 3. Mandamos los píxeles cortados en paquetes de 2048 bytes
    let chunkSize = 2048;
    for (let i = 0; i < pixeles.length; i += chunkSize) {
        let chunk = pixeles.slice(i, i + chunkSize);
        ws.send(chunk);
    }
    
    document.getElementById('estado').textContent = "✓ Imagen enviada por bloques";
}
    </script>
</body>
</html>
